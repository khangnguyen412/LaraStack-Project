name: larastack-project

services:
    # === Laravel Backend ===
    app:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: LaraStack-Web
        volumes:
            - ./backend:/var/www/html
            - ./php/php.ini:/usr/local/etc/php/php.ini
        restart: always
        networks:
            - larastack
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M

    # === Server Config ===
    web:
        image: nginx:latest
        container_name: LaraStack-Nginx
        ports:
            - "8003:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./backend:/var/www/html
        restart: always
        depends_on:
            - app
        networks:
            - larastack
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M

    # === ReactJS Frontend ===
    react:
        build:
            context: ./frontend-admin
            dockerfile: Dockerfile
        container_name: LaraStack-Frontend
        ports:
            - 3001:5173
        volumes:
            - ./frontend-admin:/app
            - /app/node_modules
        restart: always
        networks:
            - larastack
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M

    # === SQl ===
    # comment if you have mysql outside the container
    mysql:
        image: mysql:latest
        container_name: LaraStack-Mysql
        environment:
            MYSQL_DATABASE: larastack_db
            MYSQL_ROOT_PASSWORD: khang412
        volumes:
            - ./mysql:/var/lib/mysql # remove all data in ./mysql before build
        ports:
            - 3307:3306
        restart: always
        networks:
            - larastack
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M

networks:
    larastack:
        driver: bridge